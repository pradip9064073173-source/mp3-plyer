<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Base styles */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
        }

        /* Transparent Glassmorphism Container */
        .player-container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        /* Signature Headline */
        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #333;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        /* Audio Element */
        audio {
            width: 100%;
            margin-bottom: 20px;
            border-radius: 10px;
            outline: none;
        }

        /* Custom File Upload Button */
        .file-upload-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }

        .btn {
            border: none;
            background-color: rgba(255, 255, 255, 0.5);
            color: #333;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            background-color: rgba(255, 255, 255, 0.8);
        }

        .file-upload-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* Playlist Styling */
        .playlist-container {
            max-height: 250px;
            overflow-y: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            padding-top: 15px;
        }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.3);
            margin-bottom: 10px;
            padding: 10px 15px;
            border-radius: 8px;
            transition: background 0.2s ease;
        }

        .playlist-item.active {
            background: rgba(255, 255, 255, 0.7);
            font-weight: bold;
            border-left: 4px solid #333;
        }

        .song-name {
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            margin-right: 10px;
            color: #222;
        }

        .delete-btn {
            background: rgba(255, 50, 50, 0.6);
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.3s ease;
        }

        .delete-btn:hover {
            background: rgba(255, 50, 50, 0.9);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.5); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="player-container">
        <h1 class="signature">create by Pradip Patra</h1>
        <audio id="audio-player" controls></audio>
        
        <div class="file-upload-wrapper">
            <button class="btn">+ Add MP3 / MP4 Songs</button>
            <input type="file" id="file-input" accept="audio/*, video/mp4" multiple>
        </div>

        <div class="playlist-container" id="playlist">
            <div style="text-align: center; color: #333;">Loading saved songs...</div>
        </div>
    </div>

    <script>
        const audioPlayer = document.getElementById('audio-player');
        const fileInput = document.getElementById('file-input');
        const playlistContainer = document.getElementById('playlist');

        let songs = [];
        let currentSongIndex = -1;
        let db;

        // 1. Initialize IndexedDB for permanent storage
        const request = indexedDB.open("MusicPlayerDB", 1);

        request.onupgradeneeded = function(event) {
            db = event.target.result;
            // Create a table (object store) for the songs
            if (!db.objectStoreNames.contains("songs")) {
                db.createObjectStore("songs", { keyPath: "id" });
            }
        };

        request.onsuccess = function(event) {
            db = event.target.result;
            loadSongsFromDatabase();
        };

        request.onerror = function(event) {
            console.error("Database error: " + event.target.errorCode);
            playlistContainer.innerHTML = "<div style='color:red;'>Storage error. Cannot save songs permanently.</div>";
        };

        // 2. Load songs from the database when the page opens
        function loadSongsFromDatabase() {
            const transaction = db.transaction(["songs"], "readonly");
            const store = transaction.objectStore("songs");
            const request = store.getAll();

            request.onsuccess = function() {
                const storedSongs = request.result;
                songs = [];
                
                storedSongs.forEach(item => {
                    songs.push({
                        id: item.id,
                        name: item.name,
                        url: URL.createObjectURL(item.fileData), // Create a playable URL from the stored file
                        file: item.fileData
                    });
                });

                renderPlaylist();
                if (songs.length > 0) {
                    loadSong(0, false); // Load the first song, but don't autoplay
                }
            };
        }

        // 3. Handle Adding New Songs
        fileInput.addEventListener('change', function(event) {
            const files = event.target.files;
            if (files.length === 0) return;

            const transaction = db.transaction(["songs"], "readwrite");
            const store = transaction.objectStore("songs");

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const newSong = {
                    id: Date.now() + i, // Unique ID
                    name: file.name,
                    fileData: file // The actual file
                };

                store.add(newSong); // Save to database
                
                // Add to our current working list
                songs.push({
                    id: newSong.id,
                    name: newSong.name,
                    url: URL.createObjectURL(file),
                    file: file
                });
            }

            transaction.oncomplete = function() {
                renderPlaylist();
                if (audioPlayer.src === "" && songs.length > 0) {
                    loadSong(songs.length - files.length, true); // Play the first newly added song
                }
                fileInput.value = ''; // Reset input
            };
        });

        // 4. Play the next song automatically
        audioPlayer.addEventListener('ended', playNextSong);

        function playNextSong() {
            if (songs.length === 0) return;
            let nextIndex = currentSongIndex + 1;
            if (nextIndex >= songs.length) nextIndex = 0;
            loadSong(nextIndex, true);
        }

        // 5. Load a specific song into the player
        function loadSong(index, autoPlay = false) {
            if (songs.length === 0) {
                audioPlayer.src = '';
                return;
            }
            currentSongIndex = index;
            audioPlayer.src = songs[index].url;
            renderPlaylist();
            if (autoPlay) audioPlayer.play();
        }

        // 6. Render the Playlist
        function renderPlaylist() {
            if (songs.length === 0) {
                playlistContainer.innerHTML = '<div style="text-align: center; color: #555;">No songs added yet.</div>';
                return;
            }

            playlistContainer.innerHTML = ''; 
            songs.forEach((song, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'playlist-item' + (index === currentSongIndex ? ' active' : '');

                const songNameSpan = document.createElement('span');
                songNameSpan.className = 'song-name';
                songNameSpan.textContent = song.name;
                songNameSpan.onclick = () => loadSong(index, true);

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = 'Delete';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteSong(index, song.id);
                };

                itemDiv.appendChild(songNameSpan);
                itemDiv.appendChild(deleteBtn);
                playlistContainer.appendChild(itemDiv);
            });
        }

        // 7. Handle Deleting Songs (from UI and Database)
        function deleteSong(index, dbId) {
            // Remove from Database
            const transaction = db.transaction(["songs"], "readwrite");
            const store = transaction.objectStore("songs");
            store.delete(dbId);

            transaction.oncomplete = function() {
                URL.revokeObjectURL(songs[index].url); // Free memory
                songs.splice(index, 1); // Remove from array
                
                if (songs.length === 0) {
                    audioPlayer.src = '';
                    audioPlayer.pause();
                    currentSongIndex = -1;
                } else if (index === currentSongIndex) {
                    let nextIndex = currentSongIndex >= songs.length ? 0 : currentSongIndex;
                    loadSong(nextIndex, true);
                } else if (index < currentSongIndex) {
                    currentSongIndex--;
                }
                renderPlaylist();
            };
        }
    </script>
</body>
</html>
