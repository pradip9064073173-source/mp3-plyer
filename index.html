<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Audio Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%); }
        .player-container { width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); border-radius: 20px; padding: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1); }
        .signature { font-family: 'Dancing Script', cursive; text-align: center; }
        audio { width: 100%; margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; background: rgba(255,255,255,0.5); font-weight: bold; }
        .playlist-container { max-height: 300px; overflow-y: auto; margin-top: 15px; }
        .playlist-item { display: flex; justify-content: space-between; padding: 10px; background: rgba(255,255,255,0.3); margin-bottom: 5px; border-radius: 8px; align-items: center; }
        .delete-btn { background: rgba(255, 50, 50, 0.6); color: white; border: none; padding: 8px 12px; border-radius: 5px; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="player-container">
        <h1 class="signature">Pradip's Player</h1>
        <audio id="audio-player" controls></audio>
        
        <div class="file-upload-wrapper">
            <button class="btn">Add Songs</button>
            <input type="file" id="file-input" accept="audio/*, video/mp4" multiple style="display:none">
        </div>

        <div class="playlist-container" id="playlist">
            <div style="text-align: center;">Loading...</div>
        </div>
    </div>

    <script>
        const audioPlayer = document.getElementById('audio-player');
        const fileInput = document.getElementById('file-input');
        const playlistContainer = document.getElementById('playlist');
        const uploadBtn = document.querySelector('.btn');

        uploadBtn.onclick = () => fileInput.click();

        let songs = [];
        let db;

        const request = indexedDB.open("MusicPlayerDB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("songs")) db.createObjectStore("songs", { keyPath: "id" });
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            loadSongsFromDatabase();
        };

        function loadSongsFromDatabase() {
            const transaction = db.transaction(["songs"], "readonly");
            const store = transaction.objectStore("songs");
            const request = store.getAll();
            request.onsuccess = () => {
                songs = request.result.map(item => ({
                    ...item,
                    url: URL.createObjectURL(item.fileData)
                }));
                renderPlaylist();
            };
        }

        fileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            const transaction = db.transaction(["songs"], "readwrite");
            const store = transaction.objectStore("songs");

            for (let file of files) {
                const newSong = { id: Date.now() + Math.random(), name: file.name, fileData: file };
                store.add(newSong);
                songs.push({ ...newSong, url: URL.createObjectURL(file) });
            }
            transaction.oncomplete = renderPlaylist;
        });

        // Function to delete a song
        function deleteSong(id, event) {
            event.stopPropagation(); // Prevents audio from playing when clicking delete
            const transaction = db.transaction(["songs"], "readwrite");
            transaction.objectStore("songs").delete(id);
            transaction.oncomplete = () => {
                songs = songs.filter(s => s.id !== id);
                renderPlaylist();
            };
        }

        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            songs.forEach((song) => {
                const item = document.createElement('div');
                item.className = 'playlist-item';
                item.onclick = () => { audioPlayer.src = song.url; audioPlayer.play(); };
                
                item.innerHTML = `
                    <span style="flex-grow:1; overflow:hidden; text-overflow:ellipsis;">${song.name}</span>
                    <button class="delete-btn">Delete</button>
                `;
                
                item.querySelector('.delete-btn').onclick = (e) => deleteSong(song.id, e);
                playlistContainer.appendChild(item);
            });
        }
    </script>
</body>
</html>
